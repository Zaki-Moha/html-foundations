<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links and Images</title>
</head>
<body>
    <h1>Homepage</h1>
    <!--Anchor element-->
    <a href="https://www.theodinproject.com">About The Odin Project</a>

    <h2>Open in New Tab</h2>
    <!-- Opening links in a new tab-->
     <a href="https://www.theodinproject.com?about" target="_blank" rel="noreferrer">About The Odin Project</a>

    <h3>Internal Link</h3>
     <a href="about.html">About</a>

     <h4>Image Link</h4>
     <!--This is an image link-->
     <img src="https://www.theodinproject.com/mstile-310x310.png">
    
     <!--This is an image from my own web server-->
     <h4>Image My Own Web Server</h4>
     <img src="../Images/cat.avif" alt="A cat image" width="300" height="300">

     <!--Alt attribute is used for accessibility and when the image cannot be displayed-->
     <h4>Alt attribute</h4>
     <img src="https://www.theodinproject.com/mstile-310x310.png" alt="The Odin Project Logo">

     <!-- Width and Height attributes -->
     <h4>Image size attribute</h4>
     <img src="https://www.theodinproject.com/mstile-310x310.png" height="310" width="310">
</body>
</html>
