<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>
<body>
    <!-- Unordered List -->
     <h3>Unordered List</h3>
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>

    <!-- Ordered List -->
     <h3>Ordered List</h3>
     <ol>
        <li>First Item</li>
        <li>Second Item</li>
        <li>Third Item</li>
     </ol>
</body>
</html>
